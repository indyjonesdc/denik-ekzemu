# Netlify konfigurace pro Deník ekzému
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Hezčí URL pro AI funkci: /api/analyze-photos místo /.netlify/functions/analyze-photos
[[redirects]]
  from = "/api/analyze-photos"
  to = "/.netlify/functions/analyze-photos"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Service worker musí mít správný content-type
[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
